<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHC reporting</title>
    <style>
        body{
    font-family: "Times New Roman";
    background: linear-gradient(135deg, #e0f7fa, #fffde7); /* light pink background */
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 75vh;
    font-size: 14px;
    margin: 0;
    padding: 10px;
}
form{
    background-color: #ffffff ;
    padding: 25px 20px;
    border-radius: 15px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 520px;
    box-sizing: border-box;
}
input, select{
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ffb6c1;
    width: 100%;
    box-sizing: border-box;
}
h1{
    text-align: center;
    color: rgb(6, 25, 96);
font-size: 20px;
}
#sub{
    text-align: center;
    margin-top: 0px;
    color: #7a1524;
    font-weight: bold;

}
label{
    margin-bottom: 5px;
    font-weight: bold;
    color: #0c0b0c;
}
.grid{
    display: grid;
    grid-template-columns: 1fr 1fr ;
    gap: 20px ;
}
.group{
    display: flex;
    flex-direction: column;
    margin-top: 5px;
}
fieldset{
    margin-top: 10px;
    border: solid 1px rgb(225, 79, 128);
}
legend{
    color: #ff69b4;
    font-weight: bold;
}
button{
      background-color: #ff69b4;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 20px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    font-weight: bold;
}
button:hover {
    background-color: #ff85c1;
}
.del{
     display: grid;
    grid-template-columns: 1fr 1fr 1fr ;
    gap: 20px ;
}
footer{
    text-align: center;
    margin-top: 6px;
    color: rgb(169, 165, 165);

}

/* === Overlay === */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 220, 200, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 1000;
}

.popup-overlay.show {
    opacity: 1;
    pointer-events: auto;
}

/* === Message Box === */
.popup-message {
    background: rgba(255, 245, 239, 0.7);
    padding: 20px 30px;
    border-radius: 12px;
    font-size: 16px;
    color: #5a3d2b;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s, transform 0.3s;
    max-width: 80%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(255, 180, 130, 0.4);
    backdrop-filter: blur(10px);
}

.popup-message.show {
    opacity: 1;
    transform: scale(1);
}

/* === Message Variants === */
.popup-message.info { background: rgba(255, 214, 196, 0.8); color: #5a3d2b; }
.popup-message.success { background: rgba(255, 228, 204, 0.8); color: #5a3d2b; }
.popup-message.error { background: rgba(255, 183, 162, 0.85); color: #fff; }
    </style>
</head>
<body>
    <form action="" id="phcReport">
        <h1>Reporting Form for PHC</h1>
        <p id="sub">Namkhana Block, Diamond Harbour HD</p>

    <div class="grid">
        <div class="group">
        <label for="phc">Report Unit: </label>    
        <select name="phc" id="phc" required>
            <option value="">--Select PHC--</option>
            <option value="Narayanpur PHC">Narayanpur PHC</option>
            <option value="Maharajganj PHC">Maharajganj PHC</option>
            <option value="Freserganj PHC">Freserganj PHC</option>
            <option value="Bagdanga Moushuni PHC">Bagdanga Moushuni PHC</option>
        </select>
        </div>
        <div class="group">
            <label for="date">Date of Census:</label>
            <input type="date" id="date" name="date" required>
        </div>
    </div>

        <fieldset>
            <legend>OPD Census</legend>
            <div class="grid">
 <div class="group">
            <label for="new">New OPD Patient : </label>
            <input type="number" id="new" name="new" min=0 required>
        </div>
        <div class="group">
            <label for="old">Follow up (old) OPD Patient : </label>
            <input type="number" id="old" name="old" min=0 required>
        </div>        
    </div>    
    <div class="group">
            <label for="total">Total OPD Patient : </label>
            <input type="number" id="total" name="total" min=0 readonly>
        </div>
        </fieldset>
        <fieldset>
            <legend>Emergency & Admission</legend>
        <div class="grid">
            <div class="group">
                <label for="emergency">Footfall at Emergency : </label>
                <input type="number" name="emergency" id="emergency">
            </div>
             <div class="group">
                <label for="admission">Admission : </label>
                <input type="number" name="admission" id="admission">
            </div>
        </div>
        </fieldset>
        <fieldset>
            <legend>Delivery</legend>
        <div class="del">
            <div class="group">
                <label for="delivery">Delivery:</label>
                <input type="number" id="delivery"  name="delivery">
            </div>
<div class="group">
                <label for="live">Live Birth:</label>
                <input type="number" id="live"  name="live">
            </div>
            <div class="group">
                <label for="still">Still Birth:</label>
                <input type="number" id="still" name="still">
            </div>
        </div>
        </fieldset>
        <fieldset>
            <legend>Tele-Consultation Service</legend>
            <div class="group">
                <label for="tm">Telemedicine :</label>
                <input type="number" id="tm" name="tm" required>
            </div>
        </fieldset>
            <fieldset>
                <legend>HRI report</legend>
                <div class="grid">
                    <div class="group">
                        <label for="emergency_medicine">Emargency medicine:</label>
                        <input type="number" id="emergency_medicine" name="emergency_medicine" min="0">
                    </div>
                    <div class="group">
                        <label for="paediatric">Paediatric:</label>
                        <input type="number" id="paediatric" name="paediatric" min="0">
                    </div>
                    <div class="group">
                        <label for="casualty">Casualty:</label>
                        <input type="number" id="casualty" name="casualty" min="0">
                    </div>
                    <div class="group">
                        <label for="suspected_heat_stroke">Suspected heat stroke:</label>
                        <input type="number" id="suspected_heat_stroke" name="suspected_heat_stroke" min="0">
                    </div>
                </div>
            </fieldset>
        <button type="submit">Submit Report</button>
        <footer>@developed by Arthita Roy, EA, BPMU</footer>
    </form>
    <script>
//auto calculation of OPD Census
const x = document.getElementById("new");
const y=document.getElementById("old");
const z = document.getElementById("total");

function opdCensus(){
    const newP = parseFloat(x.value)||0;
    const oldP=parseFloat(y.value)||0;
    z.value =newP+oldP;
}
x.addEventListener("input",opdCensus);
y.addEventListener("input",opdCensus); 

    document.getElementById("phcReport").addEventListener("submit", async function(event) {
    event.preventDefault();
    showMessage("⏳ Submitting your report...", "info");

    const formData = new FormData(event.target);
    const url = "https://script.google.com/macros/s/AKfycbzTxqID9dGg3iJuqHaFFant38ZOX1A5mHVXPVg1DimIDGdZMs1mdtPgXhna1AW_1q_itQ/exec";

    try {
        const response = await fetch(url, {
            method: "POST",
            body: formData,
        });

        if (response.ok) {
            showMessage("✅ Submitted successfully!", "success");
            event.target.reset();
        } else {
            throw new Error("Server responded with an error");
        }
    } catch (error) {
        showMessage("❌ Submission failed! Please try again.", "error");
        console.error("Submission error:", error);
    }
});

// ✅ Modern centered message popup with overlay
function showMessage(message, type = "info", redirectUrl = 'index.html') {
    // Create overlay
    let overlay = document.createElement("div");
    overlay.className = "popup-overlay";

    // Create message box
    let msgBox = document.createElement("div");
    msgBox.textContent = message;
    msgBox.className = `popup-message ${type}`;

    // Add overlay and message box to body
    overlay.appendChild(msgBox);
    document.body.appendChild(overlay);

    // Fade-in
    setTimeout(() => {
        overlay.classList.add("show");
        msgBox.classList.add("show");
    }, 10);

    // Auto remove after 3s
    setTimeout(() => {
        msgBox.classList.remove("show");
        overlay.classList.remove("show");
        setTimeout(() => {
            overlay.remove();
            // 👇 Redirect to index.html after popup disappears
            if (redirectUrl) window.location.href = redirectUrl;
        }, 500);
    }, 5000);
}



    </script>
    
</body>
</html>
