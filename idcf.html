<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IDCF 2026 Data Entry</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #EC4899;
            --primary-hover: #DB2777;
            --primary-light: #FCE7F3;
            --bg-gradient-1: #FFFFFF;
            --bg-gradient-2: #FDF2F8;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #1F2937;
            --text-muted: #6B7280;
            --border-color: #FBCFE8;
            --border-focus: #F472B6;
            --error-color: #EF4444;
            --success-color: #10B981;
            --shadow-card: 0 20px 40px -10px rgba(236, 72, 153, 0.15), 0 10px 20px -5px rgba(236, 72, 153, 0.1);
            --shadow-input: 0 2px 4px 0 rgba(236, 72, 153, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'Baloo Da 2', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-1) 0%, var(--bg-gradient-2) 100%);
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 1rem 0.5rem;
        }

        /* Decorative background elements */
        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(252, 231, 243, 0.8) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            border-radius: 50%;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -10%;
            right: -10%;
            width: 60%;
            height: 60%;
            background: radial-gradient(circle, rgba(251, 207, 232, 0.5) 0%, rgba(255,255,255,0) 70%);
            z-index: -1;
            border-radius: 50%;
        }

        .form-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 100%;
            max-width: 500px;
            padding: 1.5rem 1.25rem;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
        }

        .form-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #F9A8D4, #EC4899, #F9A8D4);
        }

        .form-header {
            text-align: center;
            margin-bottom: 1.25rem;
        }

        .form-header h1 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            font-weight: 800;
            font-family: 'Baloo Da 2', 'Inter', sans-serif;
            color: var(--primary);
            margin-bottom: 0.25rem;
            letter-spacing: -0.01em;
        }

        .form-header p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            font-family: 'Baloo Da 2', 'Inter', sans-serif;
            font-size: clamp(0.9rem, 2.5vw, 1.05rem); /* Dynamic resizing based on screen */
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: var(--text-main);
            line-height: 1.5;
            letter-spacing: 0.015em;
            transition: color 0.3s ease;
        }

        .form-group:focus-within label {
            color: var(--primary);
        }

        .form-control {
            width: 100%;
            padding: 0.6rem 0.75rem;
            font-size: 0.9rem;
            border: 1.5px solid var(--border-color);
            border-radius: 8px;
            background-color: rgba(255, 255, 255, 0.8);
            box-shadow: var(--shadow-input);
            transition: all 0.3s ease;
            font-family: inherit;
            color: var(--text-main);
        }

        .form-control::placeholder {
            color: #9CA3AF;
        }

        .form-control:hover {
            border-color: #F9A8D4;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--border-focus);
            background-color: #FFFFFF;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15);
        }

        select.form-control {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23EC4899' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1em;
            cursor: pointer;
        }

        .radio-group {
            display: flex;
            gap: 1.25rem;
            margin-top: 0.25rem;
            padding: 0.25rem 0;
        }

        .radio-label {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-family: 'Baloo Da 2', 'Inter', sans-serif;
            font-weight: 500;
            font-size: clamp(0.9rem, 2.5vw, 1.05rem);
            cursor: pointer;
            color: var(--text-main);
            transition: color 0.2s;
        }
        
        .radio-label:hover {
            color: var(--primary);
        }

        .radio-label input[type="radio"] {
            width: 1.1rem;
            height: 1.1rem;
            accent-color: var(--primary);
            cursor: pointer;
        }

        .btn-submit {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.025em;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(236, 72, 153, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit:disabled {
            background: #D1D5DB;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
            color: #9CA3AF;
        }

        .loader {
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top: 2.5px solid white;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .message {
            margin-top: 1rem;
            padding: 0.85rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 500;
            text-align: center;
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.error {
            background-color: #FEF2F2;
            color: var(--error-color);
            border: 1px solid #FCA5A5;
            display: block;
        }

        .message.success {
            background-color: #ECFDF5;
            color: var(--success-color);
            border: 1px solid #6EE7B7;
            display: block;
        }

        /* Modal Overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(31, 41, 55, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: rgba(255, 255, 255, 0.95);
            padding: 2rem 1.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid rgba(255, 255, 255, 0.5);
            width: 90%;
            max-width: 320px;
            text-align: center;
            transform: translateY(20px) scale(0.95);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) scale(1);
        }

        .modal-icon {
            width: 56px;
            height: 56px;
            background-color: #ECFDF5;
            color: #10B981;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 1rem;
            box-shadow: 0 0 0 8px rgba(16, 185, 129, 0.1);
        }

        .modal-icon svg {
            width: 32px;
            height: 32px;
        }

        .modal-content h2 {
            color: var(--text-main);
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            font-family: 'Inter', sans-serif;
        }

        .modal-content p {
            color: var(--text-muted);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        /* Two columns layout */
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.75rem;
        }

        .grid-2 .form-group {
            margin-bottom: 0;
        }

        @media (min-width: 640px) {
            .grid-2 {
                gap: 1rem;
            }
            .form-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>

<body>

    <div class="form-container">
        <div class="form-header">
            <h1 style="font-family: 'Inter', sans-serif;">Stop Diarrhoea Campaign</h1>
        </div>

        <form id="idcfForm">
            <div class="form-group">
                <label for="facility">সুস্বাস্থ্য কেন্দ্র / উপস্বাস্থ্য কেন্দ্রের নাম </label>
                <select id="facility" class="form-control" required>
                    <option value="" disabled selected>Select a facility...</option>
                </select>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="villages_served">সুস্বাস্থ্য কেন্দ্র / উপস্বাস্থ্য কেন্দ্র কতগুলি গ্রামে পরিষেবা দেয়
                        ?</label>
                    <input type="number" id="villages_served" class="form-control" min="0" required placeholder="0">
                </div>
                <div class="form-group">
                    <label for="villages_ors">কতগুলি গ্রামে ORS বিতরণ করা হয়েছে?</label>
                    <input type="number" id="villages_ors" class="form-control" min="0" required placeholder="0">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="children_0_5">এলাকায় ০ থেকে ৫বছরের কম বয়সী শিশুর সংখ্যা কত?
                    </label>
                    <input type="number" id="children_0_5" class="form-control" min="0" required placeholder="0">
                </div>
                <div class="form-group">
                    <label for="children_given_ors">কতজন শিশুকে ORS দেওয়া হয়েছে ? </label>
                    <input type="number" id="children_given_ors" class="form-control" min="0" required placeholder="0">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="children_diarrhea">IDCF প্রোগ্রাম চলাকালীন কতগুলি শিশু ডায়রিয়াতে ভুগছিল ? </label>
                    <input type="number" id="children_diarrhea" class="form-control" min="0" required placeholder="0">
                </div>
                <div class="form-group">
                    <label for="diarrhea_ors">IDCF প্রোগ্রাম চলাকালীন কতগুলি ডায়রিয়া আক্রান্ত শিশুকে ORS দেওয়া হয়েছে
                        ?</label>
                    <input type="number" id="diarrhea_ors" class="form-control" min="0" required placeholder="0">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="diarrhea_zinc">IDCF প্রোগ্রাম চলাকালীন কতগুলি ডায়রিয়া আক্রান্ত শিশুকে ১৪ দিনের জন্য
                        জিঙ্ক দেওয়া হয়েছে ?</label>
                    <input type="number" id="diarrhea_zinc" class="form-control" min="0" required placeholder="0">
                </div>
                <div class="form-group">
                    <label for="danger_sign">IDCF প্রোগ্রাম চলাকালীন আশা কর্মীরা কতজন বিপদ সংকেত যুক্ত শিশুকে চিহ্নিত
                        করে রেফার করেছেন ? </label>
                    <input type="number" id="danger_sign" class="form-control" min="0" required placeholder="0">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="schools_handwashing">কতগুলি স্কুলে Hand Washing দেখান হয়েছে ?</label>
                    <input type="number" id="schools_handwashing" class="form-control" min="0" required placeholder="0">
                </div>
                <div class="form-group">
                    <label>সুস্বাস্থ্য কেন্দ্র / উপস্বাস্থ্য কেন্দ্রে ORS কর্নার তৈরী করা হয়েছিল কিনা </label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="ors_corner" value="Y" required> Yes
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="ors_corner" value="N"> No
                        </label>
                    </div>
                </div>
            </div>

            <div id="statusMessage" class="message"></div>

            <button type="submit" id="btnSubmit" class="btn-submit">
                <span class="btn-text">Submit Data</span>
                <span class="loader" id="loader"></span>
            </button>
        </form>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-icon">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
                </svg>
            </div>
            <h2>Success!</h2>
            <p>Your IDCF data has been submitted successfully.</p>
            <button id="btnModalOk" class="btn-submit">OK</button>
        </div>
    </div>

    <script>
        // Use the deployed Apps Script URL
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwtw-O0IjmFZq67-VbCTF-cWgHK1J1mRPhu6iuRdXZLIgVHW1qPu8FrDTRy3rXaqzXo/exec';

        const facilities = [
            "Amarabati", "Bagdanga", "Baliara New", "Baliara Old", "Bijoybati",
            "Bishalaxmipur", "Budhakhali", "Dakshin Chandanpiri", "Dakshin Chandranagar",
            "Dakshin Durgapur", "Dakshin Shibrampur", "Debnagar", "Debnibas",
            "Dwariknagar", "Fatikpur", "Ganeshnagar East", "Ganeshnagar West",
            "Haripur", "Iswaripur", "Kusumtala", "Maharajganj", "Moushuni 1st Gheri",
            "Namkhana I", "Namkhana II", "Nandavanga", "Narayanpur Part",
            "Narayanpur PHC SC", "Patibunia", "Radhanagar", "Rajnagar",
            "Rajnagar Srinathgram I", "Rajnagar Srinathgram II", "Shibnagar Abad I",
            "Shibnagar Abad II", "Shibpur", "Uttar Chandanpiri", "Uttar Shibrampur"
        ];

        // Populate dropdown
        const select = document.getElementById('facility');
        facilities.forEach(f => {
            const opt = document.createElement('option');
            opt.value = f;
            opt.textContent = f;
            select.appendChild(opt);
        });

        document.getElementById('idcfForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');
            const btnText = document.querySelector('.btn-text');
            const statusMsg = document.getElementById('statusMessage');

            const payload = {
                action: 'add',
                values: {
                    facility: document.getElementById('facility').value,
                    villages_served: parseInt(document.getElementById('villages_served').value) || 0,
                    villages_ors_distributed: parseInt(document.getElementById('villages_ors').value) || 0,
                    children_0_5: parseInt(document.getElementById('children_0_5').value) || 0,
                    children_given_ors: parseInt(document.getElementById('children_given_ors').value) || 0,
                    children_diarrhea: parseInt(document.getElementById('children_diarrhea').value) || 0,
                    diarrhea_children_ors: parseInt(document.getElementById('diarrhea_ors').value) || 0,
                    diarrhea_children_zinc: parseInt(document.getElementById('diarrhea_zinc').value) || 0,
                    danger_sign_referred: parseInt(document.getElementById('danger_sign').value) || 0,
                    schools_handwashing: parseInt(document.getElementById('schools_handwashing').value) || 0,
                    ors_corner_created: document.querySelector('input[name="ors_corner"]:checked').value
                }
            };

            btn.disabled = true;
            loader.style.display = 'block';
            btnText.textContent = 'Submitting...';
            statusMsg.className = 'message';

            try {
                // We use no-cors to prevent browser OPTIONS preflight blocks on Apps Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'text/plain'
                    },
                    body: JSON.stringify(payload)
                });

                // With no-cors, response is opaque. We assume success if no network error occurred.
                setTimeout(() => {
                    // Hide loader and revert button text
                    btn.disabled = false;
                    loader.style.display = 'none';
                    btnText.textContent = 'Submit Data';

                    // Show success modal
                    document.getElementById('successModal').classList.add('active');
                }, 800);

            } catch (error) {
                console.error('Error submitting form:', error);
                statusMsg.textContent = 'Network error. Please check your connection and try again.';
                statusMsg.className = 'message error';

                btn.disabled = false;
                loader.style.display = 'none';
                btnText.textContent = 'Submit Data';
            }
        });

        // Handle Modal OK button click
        document.getElementById('btnModalOk').addEventListener('click', function () {
            window.location.href = 'https://forms-container.netlify.app/';
        });
    </script>
</body>

</html>
