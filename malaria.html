<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaria</title>
    <style>
        body {
    padding: 10px;
    justify-content: center;
    align-items: center;
    display: flex;
    min-height: 75vh;
    margin: 0;
    background: linear-gradient(180deg, #fff5ef 0%, #ffe0cc 60%);
    font-family: "Poppins", sans-serif;
}

/* === Form Container === */
form {
    padding: 25px 20px;
    border-radius: 40px;
    max-width: 520px;
    width: 100%;
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.45);
    box-shadow: 0 8px 40px rgba(255, 182, 145, 0.35);
    border: 1px solid rgba(255, 200, 160, 0.4);
    backdrop-filter: blur(14px);
    color: #5a3d2b;
    font-size: 14px;
}

/* === Inputs & Selects (glassy look) === */
input, select {
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255, 170, 130, 0.5);
    width: 100%;
    box-sizing: border-box;
    background: rgba(255, 255, 255, 0.4);
    color: #5a3d2b;
    box-shadow: inset 0 2px 6px rgba(255, 200, 170, 0.2);
    transition: 0.3s ease;
    backdrop-filter: blur(8px);
}

input::placeholder, select {
    color: rgba(90, 61, 43, 0.7);
}

input:focus, select:focus {
    outline: none;
    border-color: #ffb38a;
    box-shadow: 0 0 10px rgba(255, 180, 130, 0.5), inset 0 2px 8px rgba(255, 200, 170, 0.2);
    background: rgba(255, 255, 255, 0.6);
}

/* === Layout Grids === */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.group {
    display: flex;
    flex-direction: column;
    margin-top: 3px;
}

/* === Fieldset & Legend === */
fieldset {
    margin-top: 10px;
    border: 1px solid rgba(255, 170, 130, 0.4);
    border-radius: 10px;
    padding: 10px;
    background: rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(6px);
}

legend {
    color: #d96b4e;
    font-weight: bold;
}

/* === Glassy Button === */
button {
    background: rgba(255, 195, 160, 0.4);
    color: #5a3d2b;
    border: 1px solid rgba(255, 180, 140, 0.5);
    padding: 12px;
    margin-top: 20px;
    border-radius: 10px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
    font-weight: bold;
    backdrop-filter: blur(8px);
    box-shadow: 0 4px 15px rgba(255, 190, 150, 0.3);
    transition: all 0.3s ease;
}

button:hover {
    background: rgba(255, 180, 140, 0.6);
    box-shadow: 0 6px 20px rgba(255, 160, 120, 0.4);
    transform: translateY(-2px);
}

/* === Labels & Text === */
label {
    margin-top: 5px;
    margin-bottom: 1px;
    color: #7a4a3a;
    font-weight: bold;
    font-size: 14px;
}

h2 {
    text-align: center;
    color: #d96b4e;
    font-weight: bold;
}

p {
    text-align: center;
    font-weight: bold;
    font-size: 16px;
    color: #a0613d;
}

.grid1 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 15px;
}

footer {
    margin-top: 6px;
    text-align: center;
    opacity: 60%;
    color: #7a4a3a;
}

/* === Overlay === */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 220, 200, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 1000;
}

.popup-overlay.show {
    opacity: 1;
    pointer-events: auto;
}

/* === Message Box === */
.popup-message {
    background: rgba(255, 245, 239, 0.7);
    padding: 20px 30px;
    border-radius: 12px;
    font-size: 16px;
    color: #5a3d2b;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s, transform 0.3s;
    max-width: 80%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(255, 180, 130, 0.4);
    backdrop-filter: blur(10px);
}

.popup-message.show {
    opacity: 1;
    transform: scale(1);
}

/* === Message Variants === */
.popup-message.info { background: rgba(255, 214, 196, 0.8); color: #5a3d2b; }
.popup-message.success { background: rgba(255, 228, 204, 0.8); color: #5a3d2b; }
.popup-message.error { background: rgba(255, 183, 162, 0.85); color: #fff; }

    </style>
</head>
<body>
    <form action="" id="malaria" >
        <h2>Fortnight Report on Malaria</h2>
        <p>Namkhana Block , Diamond Harbour HD</p>
        <hr>
     <fieldset>
     <legend>General Info:</legend>
     <div class="grid">
     <div class="group">  
     <label for="from">From :</label>
     <input type="date" id="from" name="from" required>
     </div>
     <div class="group">  
     <label for="to">To :</label>
     <input type="date" id="to" name="to" required>
     </div>     
     </div>
     <div class="group">  
     <label for="fort">Fortnight :</label>
     <input type="text" id="fort" name="fort" readonly>
     </div>
     <div class="grid">
     <div class="group">  
     <label for="type">Type of Facility :</label>
     <select name="type" id="type" required >
        <option value="">--Type of Facility--</option>
     </select>     
     </div> 
     <div class="group">  
     <label for="facility">Facility :</label>
     <select name="facility" id="facility" required>
        <option value="">--Select Facility--</option>        
     </select>     
     </div>     
     </div>  
     </fieldset>
    
     <fieldset>
    <legend>Fever cases & RDT</legend>     
        <div class="group">
            <label for="fever">Fever Patient:</label>
            <input type="number" id="fever" name="fever" required>
        </div>
        <div class="grid1">
         <div class="group">
            <label for="activeRDT">Active RDT:</label>
            <input type="number" id="activeRDT" name="activeRDT" required>
        </div>
        <div class="group">
            <label for="passiveRDT">Passive RDT:</label>
            <input type="number" id="passiveRDT" name="passiveRDT" required>
        </div>
        <div class="group">
            <label for="totalRDT">Total RDT:</label>
            <input type="number" id="totalRDT" name="totalRDT" readonly>
        </div> 
    </div>
    <div class="grid">
        <div class="group">
            <label for="rdtpercent">%RDT :</label>
            <input type="number" id="rdtpercent" name="rdtpercent" readonly>
        </div>  
        <div class="group">
            <label for="stockRDT">RDT in Stock:</label>
            <input type="number" id="stockRDT" name="stockRDT" required>
        </div>  
        </div> 
        
     
    </fieldset>
    <fieldset>
        <legend>Result of RDT </legend>
        <div class="grid">
         <div class="group">   
        <label for="pv">Pv: </label>
        <input type="number" id="pv" name="pv">
        </div>
        <div class="group">
        <label for="pf">Pf: </label>
        <input type="number" id="pf" name="pf">
        </div>
        </div>
    </fieldset>
    <fieldset>
        <legend>Blood Slide Collection</legend>
        <div class="grid1">
         <div class="group">   
        <label for="activeBS">Active Collection : </label>
        <input type="number" id="activeBS" name="activeBS">
        </div>
        <div class="group">
        <label for="passiveBS">Passive Collection: </label>
        <input type="number" id="passiveBS" name="passiveBS">
        </div>
        <div class="group">
        <label for="totalBS">Total Collection: </label>
        <input type="number" id="totalBS" name="totalBS">
        </div>
        </div>
    </fieldset>
    <fieldset>
        <legend>Mass Slide Collection</legend>
        <div class="group">
            <label for="mass">Mass Blood Slide collected?</label>
            <select name="mass" id="mass">
                <option value="">--select--</option>
                <option value="yes">Yes</option>
                <option value="no">No</option>
            </select>
        </div>
    </fieldset>    
    <button type="submit">Submit Report</button>
    <footer>@developed by Arthita Roy, EA, Namkhana BPMU</footer>
    </form>
    <script>
        //auto populate fortnight
const x = document.getElementById('from');
const y = document.getElementById('to');
const fort = document.getElementById('fort');

// Format date to DD/MM/YYYY
function formatDateString(date) {
    const day = String(date.getDate()).padStart(2, '0');
    const month = String(date.getMonth() + 1).padStart(2, '0'); // Months are 0-based
    const year = date.getFullYear();
    return `${day}/${month}/${year}`;
}

function fortnight() {
    const d1 = x.value;
    const d2 = y.value;
    const date1 = new Date(d1);
    const date2 = new Date(d2);

    // Validate both dates
    if (!isNaN(date1.getTime()) && !isNaN(date2.getTime())) {
        const formatDate1 = formatDateString(date1);
        const formatDate2 = formatDateString(date2);
        fort.value = formatDate1 + ' To ' + formatDate2;
    } else {
        fort.value = "";
    }
}

x.addEventListener('input', fortnight);
y.addEventListener('input', fortnight);

//auto calculate total RDT
const a = document.getElementById('activeRDT');
const b = document.getElementById('passiveRDT');
const c = document.getElementById('totalRDT');
function rdt(){
    const active = parseFloat(a.value)||0;
    const passive= parseFloat(b.value)||0;
    c.value = active + passive;
    percentage();
}
a.addEventListener('input',rdt);
b.addEventListener('input',rdt);

//auto calculate total Blood Slide
const BSa = document.getElementById('activeBS');
const BSp = document.getElementById('passiveBS');
const BSt = document.getElementById('totalBS');

function bloodSlide(){
    const activeBS = parseFloat(BSa.value)||0;
    const passiveBS = parseFloat(BSp.value)||0;
    BSt.value = activeBS + passiveBS;
}
BSa.addEventListener('input',bloodSlide);
BSp.addEventListener('input',bloodSlide);

//auto populate Type & Name of Facility - Cascade dropdown
const data = {
      CHC: ['Dwariknagar RH'],
      PHC: ['Narayanpur PHC', 'Maharajganj PHC', 'Freserganj PHC', 'Bagdanga Moushuni PHC'],
      SC:["Amarabati","Bagdanga","Baliara New","Baliara Old","Bijoybati","Bishalaxmipur","Budhakhali","Dakshin Chandanpiri","Dakshin Chandranagar","Dakshin Durgapur","Dakshin Shibrampur","Debnagar","Debnibas","Dwariknagar","Fatikpur","Ganeshnagar East","Ganeshnagar West","Haripur","Iswaripur","Kusumtala","Maharajganj","Moushuni 1st Gheri","Namkhana I","Namkhana II","Nandabhanga","Narayanpur PHC SC","Narayanpur Part","Patibunia","Radhanagar","Rajnagar","Rajnagar Srinathgram I","Rajnagar Srinathgram II","Shibnagar Abad I","Shibnagar Abad II","Shibpur","Uttar Chandanpiri","Uttar Shibrampur"]
    };

   const type =document.getElementById('type');
   const facility=document.getElementById('facility');

   //auto populate facility drop down
Object.keys(data).forEach(function(populateType){
    const g=document.createElement('option');
    g.value=populateType;
    g.textContent=populateType;
    type.appendChild(g);
});
type.addEventListener('change',function(){
    const selectedType=this.value;
    facility.innerHTML='<option value="">--Select Facility--</option>';

if(selectedType && data[selectedType]){
    data[selectedType].forEach(function(populateFacility){
        const h = document.createElement('option');
        h.value = populateFacility;
        h.textContent = populateFacility;
        facility.appendChild(h);
    });
}
});
//calculate percentage of RDT
const totalR=document.getElementById('totalRDT');
const fever = document.getElementById('fever');
const percent = document.getElementById('rdtpercent');

function percentage() {
    const total = parseFloat(totalR.value) || 0;
    const feverCase = parseFloat(fever.value) || 0;
    if(feverCase===0){
        percent.value=0;
    } else{  
    percent.value = ((total / feverCase) * 100).toFixed(1);  
    };
    colorCode();
};

fever.addEventListener('input', percentage);
totalR.addEventListener('input', percentage);

//Color code for RDT Test
function colorCode() {
    let value = Number(percent.value); // convert input to number
    if (value >= 70) {
        percent.style.backgroundColor = "green";
        percent.style.fontWeight="bold";
    } else{
        percent.style.backgroundColor = "lightcoral"; // valid color
        percent.style.fontWeight="bold";
    }
};

// Submit form
   document.getElementById("malaria").addEventListener("submit", async function(event) {
    event.preventDefault();

    
   
    showMessage("⏳ Submitting your report...", "info");

    const formData = new FormData(event.target);
    const url = "https://script.google.com/macros/s/AKfycbx_LrziISyFSwk7S4hnn4ShhaugadUNfHovSxWk0ENd-ugm3VA5IYA2jWNaDRKy3mJT/exec";

    try {
        const response = await fetch(url, {
            method: "POST",
            body: formData,
        });

        if (response.ok) {
            showMessage("✅ Submitted successfully!", "success");
            event.target.reset();
        } else {
            throw new Error("Server responded with an error");
        }
    } catch (error) {
        showMessage("❌ Submission failed! Please try again.", "error");
        console.error("Submission error:", error);
    }
});

// ✅ Modern centered message popup with overlay
function showMessage(message, type = "info", redirectUrl = 'index.html') {
    // Create overlay
    let overlay = document.createElement("div");
    overlay.className = "popup-overlay";

    // Create message box
    let msgBox = document.createElement("div");
    msgBox.textContent = message;
    msgBox.className = `popup-message ${type}`;

    // Add overlay and message box to body
    overlay.appendChild(msgBox);
    document.body.appendChild(overlay);

    // Fade-in
    setTimeout(() => {
        overlay.classList.add("show");
        msgBox.classList.add("show");
    }, 10);

    // Auto remove after 3s
    setTimeout(() => {
        msgBox.classList.remove("show");
        overlay.classList.remove("show");
        setTimeout(() => {
            overlay.remove();
            // 👇 Redirect to index.html after popup disappears
            if (redirectUrl) window.location.href = redirectUrl;
        }, 500);
    }, 6000);
}
    </script>
</body>

</html>
