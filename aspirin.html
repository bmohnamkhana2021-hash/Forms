<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aspirin</title>
   <style>
    
body {
   font-family: 'Times New Roman', Times, serif;
    margin: 0;
    padding: 10px;
    background: #f0f8ff;
    display: flex;
    justify-content: center;
    align-items: start;
    min-height: 100vh;
  }

  form {
    background: #ffffff;
    padding: 25px 20px;
    margin: 20px 10px;
    border-radius: 12px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
    width: 75%;
    max-width: 600px;
  }

  h2{
    text-align: center;
    color: #0056b3;
  }
p{
  text-align: center;

}
  .form-group {
    margin-bottom: 12px;
    align-self: center;
  }

  label {
    display: block;
    font-weight: 500;
    color: #333;
    margin-bottom: 5px;
    font-family: 'kalpurush';
    


  }

  input[type="number"],
  input[type="date"],
  select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 14px;
    background-color: #fff;
    box-sizing: border-box;
  }

  .radio-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    padding-top: 4px;
  }

  .radio-group label {
    font-weight: normal;
    font-size: 14px;
  }

  .conditional {
    display: none;
    background: #eef6ff;
    padding: 10px;
    border-left: 4px solid #007bff;
    border-radius: 6px;
    margin-top: 10px;
  }

  button {
    background-color: olive;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 6px;
    width: 100%;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    margin-top: 15px;
  }

  button:hover {
    background-color: #0056b3;
  }
  #confirmation {
      display: none;
      margin-top: 20px;
      text-align: center;
      color: green;
      font-weight: bold;
    }
   </style>
</head>

<body>


    <form id="healthForm" >
        <h2>Administration of Low dose Aspirin to PW</h2>
        <p>========================</p>
        <div class="form-group">
            <label for="reportingMonth">রিপোর্টিং মাস</label>
            <select id="reportingMonth" name="reportingMonth" required>
        <option value="">------Select Reporting Month-----</option>
        <option value="January">January</option>
        <option value="February">February</option>
        <option value="March">March</option>
        <option value="April">April</option>
        <option value="May">May</option>
        <option value="June">June</option>
        <option value="July">July</option>
        <option value="August">August</option>
        <option value="September">September</option>
        <option value="October">October</option>
        <option value="November">November</option>
        <option value="December">December</option>
        </select>
        </div>

        <div class="form-group">
            <label for="gp">গ্রাম পঞ্চায়েত</label>
            <select id="gp" name="gp" onchange="filterFacilities()" required>
        <option value="">--Select GP--</option>
        <option value="Budhakhali">Budhakhali</option>
        <option value="Narayanpur">Narayanpur</option>
        <option value="Namkhana">Namkhana</option>
        <option value="Haripur">Haripur</option>
        <option value="Shibrampur">Shibrampur</option>
        <option value="Freserganj">Freserganj</option>
        <option value="Moushuni">Moushuni</option>
      </select>
        </div>

        <div class="form-group">
            <label>কোন ধরনের স্বাস্থ্য প্রতিষ্ঠান</label>
            <div class="radio-group">
                <label><input type="radio" name="facilityType" value="CHC" onchange="filterFacilities()"> CHC</label>
                <label><input type="radio" name="facilityType" value="PHC" onchange="filterFacilities()"> PHC</label>
                <label><input type="radio" name="facilityType" value="HWC" onchange="filterFacilities()"> HWC</label>
                <label><input type="radio" name="facilityType" value="SC" onchange="filterFacilities()"> SC</label>
            </div>
        </div>

        <div class="form-group">
            <label for="facilityName">স্বাস্থ্য প্রতিষ্ঠানের নাম</label>
            <select id="facilityName" name="facilityName" required>
        <option value="">--Select Facility--</option>
      </select>
        </div>

        <div class="form-group">
            <label>কতজন গর্ভবতী এই মাসে নথিভুক্ত হয়েছেন</label>
            <input type="number" name="ancReg" required>
        </div>

        <div class="form-group">
            <label>কতজন গর্ভবতী এই মাসে Aspirin খাওয়া শুরু করলেন </label>
            <input type="number" name="pwAspirinStart" required>
        </div>

        <div class="form-group">
            <label>কতজন গর্ভবতী এই মাস পর্যন্ত Aspirin খাচ্ছেন (নতুন+পুরান)</label>
            <input type="number" name="pwAspirinContinue" required>
        </div>

        <div class="form-group">
            <label>কতজন গর্ভবতী এই মাসে Aspirin খাওয়ার নির্ধারিত কোর্স সম্পন্ন করলেন</label>
            <input type="number" name="pwAspirinComplete" required>
        </div>

        <div class="form-group">
            <label>কতজন গর্ভবতী এই মাসে নির্ধারিত সময়ের আগেই Aspirin খাওয়া ছেড়ে দিয়েছেন</label>
            <input type="number" id="aspirinStopped" name="pwAspirinStopped" onchange="toggleReasonSection()" required>
        </div>

        <div class="conditional" id="reasonsSection">
            <label><b>নির্ধারিত সময়ের আগেই Aspirin খাওয়া ছেড়ে দেওয়ার কারন</b></label>
            <br>
            <div class="form-group"><label>Lost to Follow up/non compliance</label><input type="number" name="reasonFollowUp"></div>
            <div class="form-group"><label>Bleeding problem</label><input type="number" name="reasonBleeding"></div>
            <div class="form-group"><label>Severe Gastritis</label><input type="number" name="reasonGastritis"></div>
            <div class="form-group"><label>Premature delivery outcome</label><input type="number" name="reasonPremature"></div>
            <div class="form-group"><label>Any other</label><input type="number" name="reasonOther"></div>
        </div>

        <div class="form-group">
            <label>যতজন গর্ভবতী Aspirin এর নির্ধারিত কোর্স শেষ করেছেন, তাদের মধ্যে কতজনের Pregnancy outcome (Delivery/Maternal death) এই মাসে হয়েছে </label>
            <input type="number" name="outcomeCases" required>
        </div>

        <div class="form-group">
            <label>প্রসবের সময়ে কি কোন প্রসব কালীন সমস্যা ছিল (কেবলমাত্র APH অথবা PPH থাকলেই রিপোর্ট করবেন)</label>
            <div class="radio-group">
                <label><input type="radio" name="deliveryComplication" value="Yes" onchange="toggleComplicationSection()"> Yes</label>
                <label><input type="radio" name="deliveryComplication" value="No" onchange="toggleComplicationSection()"> No</label>
            </div>
        </div>

        <div class="conditional" id="complicationSection">
            <div class="form-group"><label>APH</label><input type="number" name="aph" /></div>
            <div class="form-group"><label>PPH</label><input type="number" name="pph" /></div>
        </div>
        <div id="successMessage" style="display:block; color: green;"></div>
        <div id="errorMessage" style="display:block; color: red;"></div>
        <button type="submit">Submit</button>

    </form>

    <script >
        //mapping for cascade dropdrown
const facilityData = {
    Budhakhali: {
        CHC: [],
        PHC: [],
        HWC: ["Budhakhali", "Rajnagar Srinathgram I", "Rajnagar Srinathgram II", "Fatikpur", "Bishalaxmipur"],
        SC: [""]
    },
    Narayanpur: {
        CHC: [],
        PHC: ["Narayanpur PHC"],
        HWC: ["Nandabhanga", "Ganeshnagar East", "Ganeshnagar West", "Narayanpur Part", "Iswaripur"],
        SC: ["Narayanpur PHC SC"]
    },
    Haripur: {
        CHC: [],
        PHC: ["Maharajganj PHC"],
        HWC: ["Uttar Chandanpiri", "Dakshin Chandanpiri", "Dakshin Chandranagar", "Haripur"],
        SC: ["Maharajganj"]
    },
    Shibrampur: {
        CHC: [],
        PHC: [],
        HWC: ["Rajnagar", "Radhanagar", "Dakshin Shibrampur", "Uttar Shibrampur", "Patibunia", "Dakshin Durgapur"],
        SC: []
    },
    Namkhana: {
        CHC: ["Dwariknagar RH"],
        PHC: [],
        HWC: ["Namkhana I", "Namkhana II", "Shibnagar Abad I", "Shibnagar Abad II", "Debnagar"],
        SC: ["Dwariknagar"]
    },
    Freserganj: {
        CHC: [],
        PHC: ["Freserganj PHC"],
        HWC: ["Bijoybati", "Shibpur", "Debnibas"],
        SC: ["Amarabati"]
    },
    Moushuni: {
        CHC: [],
        PHC: ["Bagdanga Moushuni PHC"],
        HWC: ["Moushuni 1st Gheri", "Kusumtala", "Baliara Old", "Baliara New"],
        SC: ["Bagdanga"]
    }
};

function filterFacilities() {
    const gp = document.getElementById("gp").value;
    const facilityType = document.querySelector('input[name="facilityType"]:checked') ?.value;
    const facilityDropdown = document.getElementById("facilityName");

    facilityDropdown.innerHTML = '<option value="">--Select Facility--</option>';
    if (gp && facilityType && facilityData[gp] ?.[facilityType]) {
        facilityData[gp][facilityType].forEach(name => {
            facilityDropdown.innerHTML += `<option value="${name}">${name}</option>`;
        });
    }
}

function toggleReasonSection() {
    const value = parseInt(document.getElementById("aspirinStopped").value) || 0;
    document.getElementById("reasonsSection").style.display = value > 0 ? "block" : "none";
}

function toggleComplicationSection() {
    const value = document.querySelector('input[name="deliveryComplication"]:checked') ?.value;
    document.getElementById("complicationSection").style.display = value === "Yes" ? "block" : "none";
}

document.getElementById("healthForm").addEventListener("submit", function(e) {
    e.preventDefault(); // Stop normal form submission

    const form = e.target;

    // 🧱 Create overlay dynamically
    const overlay = document.createElement("div");
    Object.assign(overlay.style, {
        position: "fixed",
        top: "0",
        left: "0",
        width: "100%",
        height: "100%",
        background: "rgba(0,0,0,0.6)",
        display: "flex",
        justifyContent: "center",
        alignItems: "center",
        zIndex: "9999",
        color: "#fff",
        fontSize: "1.5rem",
        fontFamily: "sans-serif",
        transition: "opacity 0.5s",
    });
    overlay.innerHTML = `<div id="overlayMessage">⏳ Submitting your report...</div>`;
    document.body.appendChild(overlay);

    const overlayMessage = overlay.querySelector("#overlayMessage");

    // 🟢 Send form data
    fetch("https://script.google.com/macros/s/AKfycbyH4fUQoLCAvgETUbcLmwuPMHDtM6wBaRcoVctCcs0RBbBpzKVDwTmq_DGqr8JWqDr9/exec", {
        method: "POST",
        body: new FormData(form)
    })
    .then(response => {
        if (!response.ok) throw new Error("Network error");
        return response.text();
    })
    .then(() => {
        // ✅ Success
        overlayMessage.textContent = "✅ Report Submitted Successfully!";
        form.reset();

        // Fade out overlay and redirect
        setTimeout(() => {
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.remove();
                window.location.href = "index.html"; // Redirect here
            }, 500);
        }, 2000); // Show success message for 2 seconds
    })
    .catch(err => {
        console.error(err);
        overlayMessage.textContent = "❌ Submission failed. Please try again.";

        // Fade out overlay and redirect (optional)
        setTimeout(() => {
            overlay.style.opacity = "0";
            setTimeout(() => {
                overlay.remove();
                window.location.href = "index.html"; // Redirect here
            }, 500);
        }, 2500); // Show error message for 2.5 seconds
    });
});

    </script>


</body>

</html>
