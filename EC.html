<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Friday Meeting</title>
    <style>
        body {
    font-family: "Calibri";
    background-image: linear-gradient(to right, lightpink, lightsalmon );
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    font-size: 14px;
    margin: 0;
    padding: 10px;
}

.form-container {
    background-color: white;
    padding: 25px 20px;
    border: solid 1px salmon;
    border-radius: 15px;
    box-shadow: 2px 4px 8px gray;
    width: 100%;
    max-width: 450px;
    box-sizing: border-box;

}

h2 {
    text-align: center;
    color: #ff69b4; /* hot pink heading */
    margin-bottom: 20px;
    font-size: 20px;
}

.form-group {
    display: flex;
    flex-direction: column;
    margin-top: 12px;
}

label {
    font-weight: bold;
    color: #5a0404;
    margin-bottom: 5px;

}

input[type="text"], input[type="date"], input[type="number"], select {
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid #ffb6c1;
    width: 100%;
    box-sizing: border-box;
}

.side-by-side {
    display: flex;
    gap: 10px;
}

.side-by-side .form-group {
    flex: 1;
}

.radio-group {
    display: flex;
    gap: 20px;
    margin-top: 5px;
    flex-wrap: wrap; /* wraps on small screens */
}

.radio-group input {
    margin-top: 0;
}

button {
    background-color: #ff69b4;
    color: white;
    border: none;
    padding: 10px;
    margin-top: 20px;
    border-radius: 8px;
    cursor: pointer;
    width: 100%;
    font-size: 16px;
}

button:hover {
    background-color: #ff85c1;
}


fieldset{
    margin-top: 10px;
    margin-bottom: 10px;    
    border: solid 1px hotpink;
}
legend{
    font-weight: bold;
    margin-top: 5px;
    color:darkorchid;
}
footer{
    text-align: center;
    margin-top: 7px;
    color: rgb(197, 187, 175);
    
}
hr{
    border: inset 1px deeppink;
}
#feedback{
    text-align: center;
    font-size: 20px;
}

/* === Overlay === */
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(255, 220, 200, 0.4);
    display: flex;
    justify-content: center;
    align-items: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    z-index: 1000;
}

.popup-overlay.show {
    opacity: 1;
    pointer-events: auto;
}

/* === Message Box === */
.popup-message {
    background: rgba(255, 245, 239, 0.7);
    padding: 20px 30px;
    border-radius: 12px;
    font-size: 16px;
    color: #5a3d2b;
    opacity: 0;
    transform: scale(0.8);
    transition: opacity 0.3s, transform 0.3s;
    max-width: 80%;
    text-align: center;
    box-shadow: 0 4px 20px rgba(255, 180, 130, 0.4);
    backdrop-filter: blur(10px);
}

.popup-message.show {
    opacity: 1;
    transform: scale(1);
}

/* === Message Variants === */
.popup-message.info { background: rgba(255, 214, 196, 0.8); color: #5a3d2b; }
.popup-message.success { background: rgba(255, 228, 204, 0.8); color: #5a3d2b; }
.popup-message.error { background: rgba(255, 183, 162, 0.85); color: #fff; }
</style>   
</head>
<body>
    <div class="form-container">
        <h2>Friday meeting with Eligible Couples </h2>
        <hr>
        <form id="reportForm">
            <div class="side-by-side">
                <div class="form-group">
                    <label for="date">Date:</label>
                    <input type="date" id="date" name="date" onchange="setMonth()">
                </div>
                <div class="form-group">
                    <label for="month">Month:</label>
                    <input type="text" id="month" name="month" readonly>
                </div>
            </div>

            <div class="form-group">
                <label for="reportingUnit">Reporting Unit:</label>
                <select id="reportingUnit" name="reportingUnit" required>
                    <option value="">Select Unit</option>                   
                </select>
            </div>
<fieldset>
    <legend>Mobilization by ASHA</legend>
            <div class="side-by-side">
                <div class="form-group">
                    <label for="input1">No of EC mobilised by<br> ASHA:</label>
                    <input type="number" id="totalEC" name="TotalEC" required>
                </div>
                <div class="form-group">
                    <label for="input2">No of Teenage EC mobilised by ASHA:</label>
                    <input type="number" id="teenEC" name="teenEC" required>
                </div>
            </div>
            </fieldset>
            <fieldset>
                <legend>Family Planning Services</legend>
             <div class="side-by-side">
                <div class="form-group">
                    <label for="mini">No. of Mini Lap:</label>
                    <input type="number" id="mini" name="mini" required>
                </div>
                <div class="form-group">
                    <label for="nsv">No. of NSV:</label>
                    <input type="number" id="nsv" name="nsv" required>
                </div>
                <div class="form-group">
                    <label for="iucd">No. of IUCD :</label>
                    <input type="number" id="iucd" name="iucd" required>
                </div>
            </div>

            <div class="side-by-side">
                <div class="form-group">
                    <label for="input3">No. of Antara used:</label>
                    <input type="number" id="antara" name="antara" required>
                </div>
                <div class="form-group">
                    <label for="input4">No. of Condom distributed:</label>
                    <input type="number" id="cc" name="cc" required>
                </div>
            </div>

            <div class="side-by-side">
                <div class="form-group">
                    <label for="input5">No. of OC Pills distributed:</label>
                    <input type="number" id="op" name="op" required>
                </div>
                <div class="form-group">
                    <label for="input6">No. of EC Pills distributed:</label>
                    <input type="number" id="ec" name="ec" required>
                </div>         

            <div class="form-group">
                <label for="input7">No. of Chhaya distributed:</label>
                <input type="number" id="chhaya" name="chhaya" required>
            </div>
            </div>
</fieldset>
            <div class="form-group">
                <label>Matrima Entry (Y/N):</label>
                <div class="radio-group">
                    <label><input type="radio" name="yesNo" value="Yes" required> Yes</label>
                    <label><input type="radio" name="yesNo" value="No"> No</label>
                </div>
            </div>

            <button type="submit">Submit</button>
            <p id="feedback"></p>
            <footer>@developed by Arthita Roy, EA, Namkhana BPMU</footer>
        </form>
    </div>
    <script>
         
 //value of month-auto populated
 function setMonth() {
    const dateInput = document.getElementById('date').value;
    if (dateInput) {
        const date = new Date(dateInput);
        const month = date.toLocaleString('default', { month: 'long' });
        const year = date.getFullYear();
        document.getElementById('month').value = `${month}, ${year}`;
    }
}
//Populate Reporting Unit List / Drop down
const reportingUnit=["Amarabati","Bagdanga","Baliara New","Baliara Old","Bijoybati","Bishalaxmipur","Budhakhali","Dakshin Chandanpiri","Dakshin Chandranagar","Dakshin Durgapur","Dakshin Shibrampur","Debnagar","Debnibas","Dwariknagar","Fatikpur","Ganeshnagar East","Ganeshnagar West","Haripur","Iswaripur","Kusumtala","Maharajganj","Moushuni 1st Gheri","Namkhana I","Namkhana II","Nandabhanga","Narayanpur PHC SC","Narayanpur Part","Patibunia","Radhanagar","Rajnagar","Rajnagar Srinathgram I","Rajnagar Srinathgram II","Shibnagar Abad I","Shibnagar Abad II","Shibpur","Uttar Chandanpiri","Uttar Shibrampur"];
const myDropdown=document.getElementById("reportingUnit");
 reportingUnit.forEach(function(fruit) {
            const option = document.createElement("option");
            option.textContent = fruit;
            option.value = fruit;
            myDropdown.appendChild(option);
        });

//Teenage EC validation

document.getElementById("reportForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const totalEC = parseInt(document.getElementById("totalEC").value) || 0;
    const teenEC = parseInt(document.getElementById("teenEC").value) || 0;

    // Validation
    if (teenEC > totalEC) {
        showMessage("⚠️ Teenage EC কখনোই Total ECর চেয়ে বেশী হতে পারে না। রিপোর্ট আবার চেক করুন।", "warning");
        return;
    }

    showMessage("⏳ Submitting your report...", "info");

    const formData = new FormData(event.target);
    const url = "https://script.google.com/macros/s/AKfycbxD30udCtrfUtvvQBOVCADBQLAFiD-0LaC2GvRSLshLFEBiVh97YHtFnSRCm2HenTeG/exec";

    try {
        const response = await fetch(url, {
            method: "POST",
            body: formData,
        });

        if (response.ok) {
            showMessage("✅ Submitted successfully!", "success");
            event.target.reset();
        } else {
            throw new Error("Server responded with an error");
        }
    } catch (error) {
        showMessage("❌ Submission failed! Please try again.", "error");
        console.error("Submission error:", error);
    }
});

// ✅ Modern centered message popup with overlay
function showMessage(message, type = "info", redirectUrl = 'index.html') {
    // Create overlay
    let overlay = document.createElement("div");
    overlay.className = "popup-overlay";

    // Create message box
    let msgBox = document.createElement("div");
    msgBox.textContent = message;
    msgBox.className = `popup-message ${type}`;

    // Add overlay and message box to body
    overlay.appendChild(msgBox);
    document.body.appendChild(overlay);

    // Fade-in
    setTimeout(() => {
        overlay.classList.add("show");
        msgBox.classList.add("show");
    }, 10);

    // Auto remove after 3s
    setTimeout(() => {
        msgBox.classList.remove("show");
        overlay.classList.remove("show");
        setTimeout(() => {
            overlay.remove();
            // 👇 Redirect to index.html after popup disappears
            if (redirectUrl) window.location.href = redirectUrl;
        }, 500);
    }, 6000);
}
</script>    
</body>
</html>
